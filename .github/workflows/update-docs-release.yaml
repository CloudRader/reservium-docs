name: Update Documentation Release Notes

on:
  workflow_run:
    workflows: ["Create Release Notes"]
    types:
      - completed

jobs:
  update-docs-release:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'release-please--branches--main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Copy CHANGELOG to docs
        run: cp CHANGELOG.md docs/release-notes/documentation.md

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/release-notes/documentation.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs(release): sync changelog to documentation release notes"
            git push
          fi
